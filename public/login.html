<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-bg" style="background: linear-gradient(135deg, #0f2027, #2c5364);">
<div class="glass-card">
<i class="fas fa-unlock-alt fa-3x" style="color:#00d2ff; margin-bottom:15px;"></i>
<h2>Admin Authentication</h2>
<form action="/api/main.cpp" method="POST">
<div class="input-group">
<i class="fas fa-shield-alt"></i>
<input type="text" name="username" placeholder="Username" required>
</div>
<div class="input-group">
<i class="fas fa-key"></i>
<input type="password" name="password" placeholder="Password" required>
</div>
<button type="submit">LOGIN TO SYSTEM</button>
</form>
</div>
</body>
</html>
